<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number System Converter</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <div class="container">
        <h1>Omar Elgohrab</h1>
<h3>Number System Converter</h3>

<p class="subtitle">
    Convert Between Binary, Decimal, Octal & Hexadecimal
</p>

        <p class="subtitle">
            Convert numbers between Binary, Decimal, Octal and Hexadecimal
        </p>

        <div class="input-box">
            <label>Enter Number</label>
            <input type="text" id="number" placeholder="Example: 25">
        </div>

        <div class="select-container">

            <div class="select-box">
                <label>From</label>

                <select id="fromBase">
                    <option value="2">Binary</option>
                    <option value="8">Octal</option>
                    <option value="10" selected>Decimal</option>
                    <option value="16">Hexadecimal</option>
                </select>
            </div>

            <div class="swap-btn">

                <button onclick="swapBases()">
                    <i class="fa-solid fa-right-left"></i>
                </button>

            </div>

            <div class="select-box">

                <label>To</label>

                <select id="toBase">
                    <option value="2">Binary</option>
                    <option value="8">Octal</option>
                    <option value="10">Decimal</option>
                    <option value="16" selected>Hexadecimal</option>
                </select>

            </div>

        </div>

        <div class="buttons">

            <button class="convert" onclick="convert()">
                <i class="fa-solid fa-play"></i>
                Convert
            </button>

            <button class="clear" onclick="clearAll()">
                <i class="fa-solid fa-trash"></i>
                Clear
            </button>

        </div>

        <div class="result-card">

            <h2>Conversion Result</h2>

            <div class="result-row">
                <span>Binary</span>
                <span id="binary">---</span>
            </div>

            <div class="result-row">
                <span>Octal</span>
                <span id="octal">---</span>
            </div>

            <div class="result-row">
                <span>Decimal</span>
                <span id="decimal">---</span>
            </div>

            <div class="result-row">
                <span>Hexadecimal</span>
                <span id="hex">---</span>
            </div>

            <button class="copy" onclick="copyResult()">
                <i class="fa-solid fa-copy"></i>
                Copy Result
            </button>

        </div>

    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>

</body>

</html>
